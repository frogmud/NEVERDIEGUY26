packages:
  - 'packages/*'
  - 'apps/*'

# Dependencies allowed to run install/build scripts (pnpm 10+ blocks these by default)
allowBuilds:
  esbuild: true

# Security/version overrides (pnpm 10+ reads these here, not from package.json)
overrides:
  undici: '>=7.28.0'
  path-to-regexp: '>=6.3.0'
  tar: '>=7.5.16'
  diff: '>=7.0.0'
  esbuild: '^0.25.0'  # 0.25.0 patches the dev-server CORS advisory; stay on the 0.25 line that vite 6.4.3 depends on (forcing >=0.27 breaks vite's esbuild target handling)
  '@isaacs/brace-expansion': '>=5.0.1'
  'minimatch@<3.1.3': '>=3.1.3'
  'minimatch@>=10.0.0 <10.2.3': '>=10.2.3'
  'yaml@<1.10.3': '>=1.10.3'
  '@babel/core': '>=7.29.6'
