version: 2
updates:
  # JS/TS dependencies across the pnpm workspace
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      # one PR for low-risk patch/minor bumps
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # major bumps need deliberate, paired migrations (MUI material+icons,
      # vite+plugin-react, typescript+@types/node) - do those by hand, not as
      # auto-PR noise. Security alerts still surface via the Dependabot tab.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"

  # GitHub Actions workflow versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
