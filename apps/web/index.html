<!DOCTYPE html>
<html lang="en" style="background-color: #0a0a0a;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logos/ndg-skull-dome.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEVER DIE GUY</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="A roguelike dice game where you throw meteors at a 3D globe. Balatro-style mechanics meet intergalactic sibling rivalry." />
    <meta name="keywords" content="roguelike, dice game, 3D game, indie game, browser game" />
    <meta name="author" content="Kevin Grzejka" />
    <link rel="canonical" href="https://neverdieguy.com" />

    <!-- Open Graph (Facebook, Discord, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NEVER DIE GUY" />
    <meta property="og:description" content="A roguelike dice game where you throw meteors at a 3D globe. Balatro-style mechanics meet intergalactic sibling rivalry." />
    <meta property="og:image" content="/logos/ndg-skull-dome.svg" />
    <meta property="og:url" content="https://neverdieguy.com" />
    <meta property="og:site_name" content="NEVER DIE GUY" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NEVER DIE GUY" />
    <meta name="twitter:description" content="A roguelike dice game where you throw meteors at a 3D globe. Balatro-style mechanics meet intergalactic sibling rivalry." />
    <meta name="twitter:image" content="/logos/ndg-skull-dome.svg" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0a" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="preload" href="/logos/ndg-skull-dome.svg" as="image" />
    <script>
      (function() {
        var isHomeBootPath = window.location.pathname === '/' || window.location.pathname === '/home';
        document.documentElement.classList.add(isHomeBootPath ? 'ndg-boot-route-home' : 'ndg-boot-route-app');
        window.__NDG_BOOT_SHELL_PENDING__ = isHomeBootPath;
        window.__NDG_BOOT_SHELL_PATH__ = window.location.pathname;
      })();
    </script>
    <style>
      @font-face {
        font-family: 'm6x11plus';
        src: url('/fonts/m6x11plus.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      /* APL385 Unicode font for ASCII globe rendering */
      @font-face {
        font-family: 'APL385 Unicode';
        src: url('/fonts/APL385.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      /* First paint shell - React replaces #root contents on mount */
      @keyframes ndg-skeleton-breathe {
        0%, 100% { opacity: 0.38; }
        50% { opacity: 0.56; }
      }
      @keyframes ndg-card-spinner {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .ndg-boot-shell {
        display: flex;
        min-height: 100vh;
        width: 100%;
        background: #0a0a0a;
      }
      .ndg-boot-sidebar {
        width: 140px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        border-right: 1px solid #2a2a2a;
        background: #141414;
      }
      .ndg-boot-sidebar__logo {
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid #2a2a2a;
      }
      .ndg-boot-sidebar__logo img {
        width: 32px;
        height: 36px;
        object-fit: contain;
        opacity: 0.92;
      }
      .ndg-boot-sidebar__nav {
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: 16px 4px 8px;
        flex: 1;
        overflow: hidden;
      }
      .ndg-boot-sidebar__bottom {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: 12px 4px 8px;
        border-top: 1px solid #2a2a2a;
      }
      .ndg-boot-nav-row {
        display: flex;
        align-items: center;
        min-height: 40px;
        margin: 0 4px 8px;
        padding: 6px 12px;
        border-radius: 8px;
        box-sizing: border-box;
      }
      .ndg-boot-sidebar__bottom .ndg-boot-nav-row {
        margin-bottom: 2px;
      }
      .ndg-boot-search-row .ndg-boot-nav-icon-wrap {
        margin-right: 3px;
      }
      .ndg-boot-user-row {
        min-height: 44px;
      }
      .ndg-boot-user-row .ndg-boot-nav-icon-wrap {
        margin-right: 4px;
      }
      .ndg-boot-nav-icon-wrap {
        width: 32px;
        margin-right: 6px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        flex-shrink: 0;
      }
      .ndg-boot-nav-icon {
        width: 28px;
        height: 28px;
        object-fit: contain;
        image-rendering: pixelated;
        flex-shrink: 0;
      }
      .ndg-boot-nav-label {
        color: #f5f5f5;
        font-family: Inter, system-ui, sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        line-height: 1;
      }
      .ndg-boot-nav-row--muted .ndg-boot-nav-label {
        color: #5c5c5c;
        font-weight: 600;
      }
      .ndg-boot-search-mark {
        width: 22px;
        height: 22px;
        position: relative;
        flex-shrink: 0;
        opacity: 1;
      }
      .ndg-boot-search-mark::before {
        content: "";
        position: absolute;
        left: 3px;
        top: 3px;
        width: 10px;
        height: 10px;
        border: 2px solid #5c5c5c;
        border-radius: 50%;
      }
      .ndg-boot-search-mark::after {
        content: "";
        position: absolute;
        left: 14px;
        top: 15px;
        width: 8px;
        height: 2px;
        border-radius: 2px;
        background: #5c5c5c;
        transform: rotate(45deg);
        transform-origin: left center;
      }
      .ndg-boot-user-avatar {
        width: 24px;
        height: 24px;
        border-radius: 4px;
        overflow: hidden;
        background: #1e1e1e;
        flex-shrink: 0;
      }
      .ndg-boot-user-avatar img {
        width: 140%;
        height: 140%;
        object-fit: cover;
        object-position: top center;
        image-rendering: pixelated;
        margin-left: -20%;
      }
      .ndg-boot-sidebar__utilities {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 2px;
        padding: 2px 12px 0;
      }
      .ndg-boot-utility-icon {
        width: 32px;
        height: 32px;
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #5c5c5c;
        opacity: 0.42;
        flex-shrink: 0;
      }
      .ndg-boot-utility-icon--friends::before,
      .ndg-boot-utility-icon--friends::after {
        content: "";
        position: absolute;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
        top: 9px;
      }
      .ndg-boot-utility-icon--friends::before {
        left: 9px;
      }
      .ndg-boot-utility-icon--friends::after {
        right: 9px;
      }
      .ndg-boot-utility-icon--friends span {
        width: 18px;
        height: 8px;
        border-radius: 8px 8px 3px 3px;
        background: currentColor;
        margin-top: 12px;
      }
      .ndg-boot-utility-icon--info::before {
        content: "i";
        font-family: Inter, system-ui, sans-serif;
        font-size: 17px;
        font-weight: 700;
        line-height: 1;
      }
      .ndg-boot-utility-icon--build::before {
        content: "";
        width: 16px;
        height: 4px;
        border-radius: 4px;
        background: currentColor;
        transform: rotate(45deg);
        box-shadow: 0 -5px 0 -1px currentColor, 0 5px 0 -1px currentColor;
      }
      .ndg-boot-menu-mark {
        width: 40px;
        height: 40px;
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        flex-shrink: 0;
      }
      .ndg-boot-menu-mark span {
        display: block;
        width: 24px;
        height: 2px;
        border-radius: 2px;
        background: #a0a0a0;
      }
      .ndg-boot-skeleton {
        border-radius: 4px;
        background: #2a2a2a;
        animation: ndg-skeleton-breathe 2.8s ease-in-out infinite;
      }
      .ndg-boot-skeleton--icon {
        width: 28px;
        height: 28px;
      }
      .ndg-boot-skeleton--label {
        width: 58px;
        height: 12px;
      }
      .ndg-boot-skeleton--label-short {
        width: 42px;
        height: 12px;
      }
      .ndg-boot-skeleton--avatar {
        width: 24px;
        height: 24px;
        border-radius: 4px;
      }
      .ndg-boot-main {
        position: relative;
        flex: 1;
        min-width: 0;
        min-height: 100vh;
        overflow: hidden;
      }
      .ndg-boot-topbar {
        display: none;
      }
      .ndg-boot-topbar__brand {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: #f5f5f5;
        font-family: m6x11plus, Inter, system-ui, sans-serif;
        font-size: 0.85rem;
        line-height: 1;
      }
      .ndg-boot-topbar__spacer {
        width: 40px;
        height: 40px;
        flex-shrink: 0;
      }
      .ndg-boot-home {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        padding: 30px;
        overflow: hidden;
      }
      .ndg-boot-home__top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .ndg-boot-home__identity,
      .ndg-boot-home__metric {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .ndg-boot-home__stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .ndg-boot-home__body {
        flex: 1;
        min-height: 0;
        display: flex;
        gap: 48px;
        padding-top: 48px;
      }
      .ndg-boot-home__actions {
        width: 260px;
        flex-shrink: 0;
      }
      .ndg-boot-home__cards {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding-top: 56px;
      }
      .ndg-boot-home__cards-inner {
        width: min(650px, 100%);
      }
      .ndg-boot-home__cards-label {
        width: 92px;
        height: 14px;
        border-radius: 4px;
        margin: 0 0 12px 4px;
      }
      .ndg-boot-home__mat {
        width: 100%;
        box-sizing: border-box;
        min-height: 300px;
        border-radius: 24px;
        padding: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #141414;
        opacity: 0.58;
      }
      .ndg-boot-home__spinner {
        width: 34px;
        height: 34px;
        border: 3px solid rgba(224, 49, 73, 0.18);
        border-top-color: #e03149;
        border-radius: 50%;
        animation: ndg-card-spinner 1.15s linear infinite;
      }
      .ndg-boot-home__button {
        width: 100%;
        border-radius: 16px;
        margin-bottom: 16px;
        background: #1e1e1e;
        animation: ndg-skeleton-breathe 2.8s ease-in-out infinite;
      }
      .ndg-boot-route-fallback {
        display: none;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      .ndg-boot-route-spinner {
        width: 34px;
        height: 34px;
        border: 3px solid rgba(224, 49, 73, 0.18);
        border-top-color: #e03149;
        border-radius: 50%;
        animation: ndg-card-spinner 1.15s linear infinite;
      }
      .ndg-boot-route-app .ndg-boot-home {
        display: none;
      }
      .ndg-boot-route-app .ndg-boot-route-fallback {
        display: flex;
      }
      @media (max-width: 768px) {
        .ndg-boot-shell {
          flex-direction: column;
        }
        .ndg-boot-sidebar {
          display: none;
        }
        .ndg-boot-topbar {
          height: 56px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          flex-shrink: 0;
          padding: 0 16px;
          border-bottom: 1px solid #2a2a2a;
          background: #0a0a0a;
        }
        .ndg-boot-topbar img {
          width: 24px;
          height: 28px;
          object-fit: contain;
          opacity: 0.92;
        }
        .ndg-boot-main {
          min-height: calc(100vh - 56px);
        }
        .ndg-boot-home {
          min-height: calc(100vh - 56px);
          padding: 30px;
        }
        .ndg-boot-home__body {
          display: block;
          padding-top: 32px;
        }
        .ndg-boot-home__actions {
          width: 100%;
        }
        .ndg-boot-home__cards {
          display: none;
        }
        .ndg-boot-route-fallback {
          min-height: calc(100vh - 56px);
        }
      }
      @media (min-width: 769px) and (max-width: 1024px) {
        .ndg-boot-sidebar {
          width: 58px;
        }
        .ndg-boot-nav-row {
          justify-content: center;
          margin-right: 4px;
          margin-left: 4px;
          padding-right: 8px;
          padding-left: 8px;
        }
        .ndg-boot-nav-icon-wrap {
          width: auto;
          margin-right: 0;
          justify-content: center;
        }
        .ndg-boot-search-row .ndg-boot-nav-icon-wrap,
        .ndg-boot-user-row .ndg-boot-nav-icon-wrap {
          margin-right: 0;
        }
        .ndg-boot-nav-label,
        .ndg-boot-user-label {
          display: none;
        }
        .ndg-boot-sidebar__utilities {
          flex-direction: column;
          justify-content: center;
          gap: 4px;
          padding: 12px 4px 2px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .ndg-boot-skeleton,
        .ndg-boot-home__button,
        .ndg-boot-home__spinner,
        .ndg-boot-route-spinner {
          animation: none;
        }
      }
    </style>
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "NEVER DIE GUY",
      "url": "https://neverdieguy.com",
      "description": "A roguelike dice game where you throw meteors at a 3D globe. Balatro-style mechanics meet intergalactic sibling rivalry.",
      "genre": ["Roguelike", "Dice Game", "Browser Game"],
      "gamePlatform": "Web Browser",
      "applicationCategory": "Game",
      "creator": {
        "@type": "Person",
        "name": "Kevin Grzejka",
        "url": "https://kgrz.design"
      }
    }
    </script>

    <!-- Preload APL font for globe rendering -->
    <link rel="preload" href="/fonts/APL385.ttf" as="font" type="font/ttf" crossorigin />
    <!-- FOUC Prevention: Apply user settings before React hydration -->
    <script>
      (function() {
        try {
          var s = JSON.parse(localStorage.getItem('ndg_settings') || '{}');
          var cl = document.documentElement.classList;
          if (s.largeText) cl.add('large-text');
          if (s.reducedMotion) cl.add('reduced-motion');
          if (s.compactMode) cl.add('compact-mode');
          if (s.highContrast) cl.add('high-contrast');
          document.documentElement.lang = s.language || 'en';
        } catch(e) {}
      })();
    </script>
  </head>
  <body style="background-color: #0a0a0a; margin: 0;">
    <div id="root" style="background-color: #0a0a0a; min-height: 100vh;">
      <div class="ndg-boot-shell">
        <aside class="ndg-boot-sidebar" aria-hidden="true">
          <div class="ndg-boot-sidebar__logo">
            <img src="/logos/ndg-skull-dome.svg" alt="" />
          </div>
          <div class="ndg-boot-sidebar__nav">
            <div class="ndg-boot-nav-row">
              <span class="ndg-boot-nav-icon-wrap">
                <img class="ndg-boot-nav-icon" src="/assets/nav/nav1-play.svg" alt="" />
              </span>
              <span class="ndg-boot-nav-label">Play</span>
            </div>
            <div class="ndg-boot-nav-row">
              <span class="ndg-boot-nav-icon-wrap">
                <img class="ndg-boot-nav-icon" src="/assets/nav/nav2-wiki.svg" alt="" />
              </span>
              <span class="ndg-boot-nav-label">Wiki</span>
            </div>
          </div>
          <div class="ndg-boot-sidebar__bottom">
            <div class="ndg-boot-nav-row ndg-boot-nav-row--muted ndg-boot-search-row">
              <span class="ndg-boot-nav-icon-wrap">
                <span class="ndg-boot-search-mark"></span>
              </span>
              <span class="ndg-boot-nav-label">Search</span>
            </div>
            <div class="ndg-boot-nav-row ndg-boot-user-row">
              <span class="ndg-boot-nav-icon-wrap">
                <span class="ndg-boot-user-avatar">
                  <img src="/assets/characters/travelers/sprite-never-die-guy-1.png" alt="" />
                </span>
              </span>
              <span class="ndg-boot-skeleton ndg-boot-skeleton--label ndg-boot-user-label"></span>
            </div>
            <div class="ndg-boot-sidebar__utilities">
              <span class="ndg-boot-utility-icon ndg-boot-utility-icon--friends"><span></span></span>
              <span class="ndg-boot-utility-icon ndg-boot-utility-icon--info"></span>
              <span class="ndg-boot-utility-icon ndg-boot-utility-icon--build"></span>
            </div>
          </div>
        </aside>
        <div class="ndg-boot-topbar" aria-hidden="true">
          <span class="ndg-boot-menu-mark"><span></span><span></span><span></span></span>
          <span class="ndg-boot-topbar__brand">
            <img src="/logos/ndg-skull-dome.svg" alt="" />
            <span>NEVERDIEGUY</span>
          </span>
          <span class="ndg-boot-topbar__spacer"></span>
        </div>
        <main class="ndg-boot-main">
          <div class="ndg-boot-route-fallback" aria-hidden="true">
            <div class="ndg-boot-route-spinner"></div>
          </div>
          <div class="ndg-boot-home" aria-hidden="true">
            <div class="ndg-boot-home__top">
              <div class="ndg-boot-home__identity">
                <span class="ndg-boot-skeleton" style="width:56px;height:56px;border-radius:8px;"></span>
                <div class="ndg-boot-home__stack">
                  <span class="ndg-boot-skeleton" style="width:128px;height:14px;"></span>
                  <div style="display:flex;gap:8px;">
                    <span class="ndg-boot-skeleton" style="width:24px;height:24px;border-radius:50%;"></span>
                    <span class="ndg-boot-skeleton" style="width:24px;height:24px;border-radius:50%;"></span>
                  </div>
                </div>
              </div>
              <span class="ndg-boot-skeleton" style="width:40px;height:40px;border-radius:8px;"></span>
            </div>
            <div class="ndg-boot-home__body">
              <div class="ndg-boot-home__actions">
                <div class="ndg-boot-home__metric" style="margin-bottom:32px;">
                  <span class="ndg-boot-skeleton" style="width:86px;height:86px;border-radius:50%;"></span>
                  <div class="ndg-boot-home__stack">
                    <span class="ndg-boot-skeleton" style="width:132px;height:14px;"></span>
                    <span class="ndg-boot-skeleton" style="width:46px;height:42px;"></span>
                  </div>
                </div>
                <div class="ndg-boot-home__button" style="height:80px;"></div>
                <div class="ndg-boot-home__button" style="height:88px;animation-delay:120ms;"></div>
                <div class="ndg-boot-home__button" style="height:68px;animation-delay:240ms;"></div>
                <div class="ndg-boot-home__button" style="height:68px;animation-delay:360ms;"></div>
                <span class="ndg-boot-skeleton" style="display:block;width:104px;height:10px;margin:24px auto 0;"></span>
              </div>
              <div class="ndg-boot-home__cards">
                <div class="ndg-boot-home__cards-inner">
                  <div class="ndg-boot-home__cards-label"></div>
                  <div class="ndg-boot-home__mat">
                    <div class="ndg-boot-home__spinner" data-testid="home-card-spinner"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
